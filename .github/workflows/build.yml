name: Build Candice Revisions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload generated HTML
        uses: actions/upload-artifact@v4
        with:
          name: candice-revisions-html
          path: |
            index.html
            dist/candice-revisions.html
